<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área de Cadastro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <div class="usuario-container">
        <div class="usuario-header">
            <div class="avatar-wrapper">
                <i class="fa-solid fa-user"></i>
            </div>
            <h2>User</h2>
            <p>Fazer login / Cadastrar-se</p>
        </div>

        <div class="usuario-info">
            <div class="info-grupo">
               <div class="input-container">
  <label for="campo-texto">E-mail:</label>
  <input type="text" id="campo-texto" placeholder="usuarioemail@gmail.com...">
  <label for="campo-texto">Senha:</label>
  <input type="text" id="campo-texto" placeholder="Digite sua senha...">
</div>
            </div>
            
        </div>

        <div class="usuario-acoes">
            <a href="index.html" class="btn-voltar">Login</a>
            <p>Não possui uma conta?</p>
            <a href="cadastre-se.html" class="btn-voltar">Cadastre-se</a>
        </div>
    </div>

</body>
</html>
