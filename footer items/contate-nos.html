<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body>
    <a href="/index.html" class="back-arrow" aria-label="Voltar para a página inicial"> ← </a>
    <div class="contato-container">
        <div class="contato-header">
            <div class="avatar-wrapper">
            </div>
            <h2><strong>Entre em contato conosco por aqui!</strong></h2>
        </div>

        <div class="usuario-info">
            <div class="info-grupo">
               <div class="input-container">
  <label for="campo-texto">Seu nome:</label>
  <input type="text" id="campo-texto" placeholder="Digite seu nome...">
  <label for="campo-texto">Seu e-mail:</label>
  <input type="text" id="campo-texto" placeholder="usuarioemail@gmail.com...">
  <label for="campo-texto">Sua mensagem:</label>
  <input type="text" id="campo-texto" id="campo-mensagem" placeholder="Escreva sua mensagem">
</div>
            </div>
            
        </div>

        <div class="usuario-acao">
                <div class="submit-container">
                <input type="checkbox" id="form-submit" class="submit-toggle">
                <label for="form-submit" class="btn-enviar">Enviar</label>
                <div class="success-message">
                 Solicitação enviada.
                </div>
        </div>
    </div>
</body>
